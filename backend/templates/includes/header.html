{% load static %}
<header>
  <nav class="navbar navbar-expand-lg navbar-light bg-transparent">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">Re<span style="color:var(--color-cerrado-green)">Co</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="/marketplace/">Marketplace</a></li>
          {% if is_logged_in %}
            <li class="nav-item"><a class="nav-link" href="/profile/">Perfil</a></li>
            <li class="nav-item"><a class="nav-link" href="#" id="logoutLink">Sair</a></li>
          {% else %}
            <li class="nav-item"><a class="nav-link" href="/login/">Entrar</a></li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>
</header>

<script>
  // simple logout handler for demo (clears localStorage and redirects)
  (function(){
    const logout = document.getElementById('logoutLink');
    if(!logout) return;
    logout.addEventListener('click', function(e){
      e.preventDefault();
      try{ localStorage.removeItem('reco_token'); localStorage.removeItem('reco_userId'); localStorage.removeItem('reco_role'); }catch(_){}
      window.location.href = '/';
    });
  })();
</script>
