{% load static %}
{% extends 'base.html' %}
{% block title %}Cadastrar — ReCo{% endblock %}
{% block content %}
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4">
          <h3>Cadastre-se</h3>
          <form id="register-form" method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Nome</label>
              <input id="register-name" name="name" class="form-control" />
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input id="register-email" name="email" type="email" class="form-control" />
            </div>
            <div class="mb-3">
              <label class="form-label">Senha</label>
              <input id="register-password" name="password" type="password" class="form-control" />
            </div>
            <div class="d-flex justify-content-end">
              <button id="register-submit" class="btn btn-success">Cadastrar</button>
            </div>
          </form>
          <div id="register-feedback" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
{% block extra_scripts %}
  <script src="{% static 'js/auth.js' %}"></script>
{% endblock %}
