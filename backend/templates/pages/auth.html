{% extends 'base.html' %}
{% block title %}Entrar — ReCo{% endblock %}
{% block content %}
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4">
          <h3>Entrar</h3>
          <form id="login-form" method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input id="login-email" name="email" class="form-control" />
            </div>
            <div class="mb-3">
              <label class="form-label">Senha</label>
              <input id="login-password" name="password" type="password" class="form-control" />
            </div>
            <div class="d-flex justify-content-between align-items-center">
              <button id="login-submit" class="btn btn-warning">Entrar</button>
              <a href="{% url 'web:archive_register' %}">Cadastrar</a>
            </div>
          </form>
          <div id="login-feedback" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
{% block extra_scripts %}
  <script src="{% static 'js/auth.js' %}"></script>
{% endblock %}
