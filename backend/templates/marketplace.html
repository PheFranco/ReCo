<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Marketplace — ReCo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style/global.css" />
  <style>
    .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; max-width:1100px; margin:32px auto }
    .card{ background:#fff;padding:12px;border-radius:10px }
    .card h3{ margin:8px 0 }
    .thumb{ height:140px; background:#f3f3f3; border-radius:8px }
  </style>
</head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-light bg-transparent">
        <div class="container">
          <a class="navbar-brand fw-bold" href="/">Re<span style="color:var(--color-cerrado-green)">Co</span></a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item"><a class="nav-link" href="/">Início</a></li>
              <li class="nav-item"><a class="nav-link active" aria-current="page" href="/marketplace/">Marketplace</a></li>
              <li class="nav-item"><a class="nav-link" href="/login/">Entrar</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="py-5">
      <div class="container">
        <h1 class="mb-2">Marketplace</h1>
        <p class="mb-4">Explore itens doados e reutilizáveis perto de você.</p>

        <div id="marketplaceGrid" class="row g-3"></div>
        <template id="marketItemTpl">
          <div class="col-sm-6 col-lg-4">
            <div class="card h-100">
              <div class="card-img-top thumb" style="height:140px;background:#f3f3f3;border-top-left-radius: .5rem;border-top-right-radius: .5rem;background-size:cover;background-position:center"></div>
              <div class="card-body d-flex flex-column">
                <h5 class="card-title"></h5>
                <p class="card-text text-muted small"></p>
                <div class="mt-auto"><button class="btn btn-outline-primary view-btn">Ver</button></div>
              </div>
            </div>
          </div>
        </template>
        <div id="marketplaceEmpty" class="text-center text-muted py-6">
          <p class="lead">Nenhum item disponível no momento.</p>
          <p>Se você for um doador, adicione itens a partir do seu perfil.</p>
          <a href="/profile/" class="btn btn-primary">Ir ao meu perfil</a>
        </div>
      </div>
    </main>

    <!-- Item detail modal -->
    <div class="modal fade" id="marketplaceModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="marketplaceModalLabel">Detalhes do item</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div class="modal-body">
            <div class="row">
              <div class="col-md-5">
                <div id="modalImage" style="width:100%;height:220px;background:#f3f3f3;border-radius:8px;background-size:cover;background-position:center"></div>
              </div>
              <div class="col-md-7">
                <h4 id="modalTitle"></h4>
                <p id="modalDesc" class="text-muted small"></p>
                <p class="mt-3"><strong>Doador:</strong> <span id="modalDonor"></span></p>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
            <a id="modalContact" class="btn btn-primary" href="#">Contactar doador</a>
          </div>
        </div>
      </div>
    </div>

    <footer class="text-center mt-4 text-muted">© 2025 ReCo — Demo estático</footer>
    <script src="/static/js/header.js"></script>
    <script>
      // Render marketplace items from localStorage and show detail modal
      (function(){
        const grid = document.getElementById('marketplaceGrid');
        const tpl = document.getElementById('marketItemTpl');
        const empty = document.getElementById('marketplaceEmpty');
        const modalEl = document.getElementById('marketplaceModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const modalImage = document.getElementById('modalImage');
        const modalDonor = document.getElementById('modalDonor');
        const modalContact = document.getElementById('modalContact');
        let bsModal = null;
        try{ bsModal = new bootstrap.Modal(modalEl); }catch(e){ bsModal = null; }

        let items = [];
        try{ items = JSON.parse(localStorage.getItem('marketplace_items')||'[]'); }catch(e){ items = []; }

        function openModalFor(it){
          modalTitle.textContent = it.title || 'Sem título';
          modalDesc.textContent = it.desc || '';
          modalDonor.textContent = it.donor || 'Anônimo';
          if(it.image){ modalImage.style.backgroundImage = `url(${it.image})`; } else { modalImage.style.backgroundImage = ''; }
          // contact link: if donor looks like email, use mailto, else link to profile
          const donor = it.donor || '';
          if(donor.indexOf('@') !== -1){
            modalContact.setAttribute('href', `mailto:${encodeURIComponent(donor)}?subject=${encodeURIComponent('Interesse no item: '+(it.title||''))}`);
            modalContact.setAttribute('target','_blank');
          } else {
            modalContact.setAttribute('href', `/profile/?name=${encodeURIComponent(donor)}`);
            modalContact.removeAttribute('target');
          }
          if(bsModal) bsModal.show(); else alert(it.title + '\n\n' + (it.desc||''));
        }

        function render(){
          grid.innerHTML = '';
          if(!items || items.length === 0){ empty.style.display = ''; return; }
          empty.style.display = 'none';
          items.forEach(it=>{
            const node = tpl.content.cloneNode(true);
            const img = node.querySelector('.card-img-top');
            const title = node.querySelector('.card-title');
            const meta = node.querySelector('.card-text');
            const btn = node.querySelector('.view-btn');
            title.textContent = it.title || 'Sem título';
            meta.textContent = `Doado por ${it.donor || 'Anônimo'} • ${it.desc || ''}`;
            if(it.image){ img.style.backgroundImage = `url(${it.image})`; }
            btn.addEventListener('click', ()=> openModalFor(it));
            grid.appendChild(node);
          });
        }
        render();
      })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
