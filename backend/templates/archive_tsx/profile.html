{% extends "base.html" %}
{% block title %}Meu Perfil — ReCo{% endblock %}
{% block content %}
	<div class="container py-5">
		<div class="row">
			<div class="col-md-8">
				<div class="card p-4 mb-4">
					<div class="d-flex align-items-center gap-3">
						<div style="width:72px;height:72px;border-radius:50%;background:#ddd;display:flex;align-items:center;justify-content:center">👤</div>
						<div>
							<h2>{{ user_name }}</h2>
							<p class="text-muted">Gerencie suas informações e doações</p>
						</div>
					</div>
				</div>

				<div class="card p-4">
					<h3>Minhas Doações</h3>
					<p class="text-muted">Lista de itens cadastrados por você aparecerá aqui.</p>
					<!-- Se tivesse itens, renderizaríamos com um loop -->
				</div>
			</div>
		</div>
	</div>
{% endblock %}
