<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cadastrar — ReCo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style/global.css" />
  <style>
    .center-card{ max-width:520px; margin:96px auto; padding:24px; background:#fff; border-radius:12px }
    .form-row{ margin-bottom:12px }
    /* Use theme accent color to ensure contrast and consistency */
    .btn{ display:inline-block; padding:10px 14px; border-radius:8px; cursor:pointer }
    .btn-primary{ background:var(--accent); color:#fff; border:none }
  </style>
</head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-light bg-transparent">
        <div class="container">
          <a class="navbar-brand fw-bold" href="index.html">Re<span style="color:var(--color-cerrado-green)">Co</span></a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
              <li class="nav-item"><a class="nav-link" href="marketplace.html">Marketplace</a></li>
              <li class="nav-item"><a class="nav-link" href="login.html">Entrar</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="min-vh-100 d-flex align-items-center">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm">
              <div class="card-body p-4">
                <h1 class="h4 mb-1">Criar conta</h1>
                <p class="text-muted mb-3">Preencha seus dados para criar uma conta</p>

                <form id="registerForm" action="profile.html" method="get">
                  <div class="mb-3">
                    <label for="name" class="form-label">Nome completo</label>
                    <input id="name" name="name" type="text" class="form-control" placeholder="Seu nome" required />
                  </div>
                  <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input id="email" name="email" type="email" class="form-control" placeholder="seu@exemplo.com" required />
                  </div>
                  <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <input id="password" name="password" type="password" class="form-control" placeholder="Crie uma senha" required />
                  </div>

                  <fieldset class="mb-3">
                    <legend class="form-label">Tipo de perfil</legend>
                    <div class="form-check form-check-inline">
                      <input class="form-check-input" type="radio" name="role" id="roleDoador" value="doador" checked>
                      <label class="form-check-label" for="roleDoador">Doador</label>
                    </div>
                    <div class="form-check form-check-inline">
                      <input class="form-check-input" type="radio" name="role" id="roleRecebedor" value="recebedor">
                      <label class="form-check-label" for="roleRecebedor">Recebedor</label>
                    </div>
                  </fieldset>

                  <div id="doadorFields" class="mb-3">
                    <label class="form-label">Sou (doador):</label>
                    <div>
                      <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="doador_type" id="doadorPf" value="pf" checked>
                        <label class="form-check-label" for="doadorPf">Pessoa física</label>
                      </div>
                      <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="doador_type" id="doadorOng" value="ong">
                        <label class="form-check-label" for="doadorOng">ONG / Empresa</label>
                      </div>
                    </div>
                    <div id="razaoWrap" class="mt-3" style="display:none">
                      <label for="razao" class="form-label">Razão social (ONG/Empresa)</label>
                      <input id="razao" name="razao" type="text" class="form-control" placeholder="Razão social" />
                    </div>
                    <div id="doadorCpfFields" class="mt-3" style="display:none">
                      <label for="doador_cpf" class="form-label">CPF</label>
                      <input id="doador_cpf" name="doador_cpf" type="text" class="form-control" placeholder="000.000.000-00" />
                    </div>
                  </div>

                  <div id="recebedorFields" class="mb-3" style="display:none">
                    <label class="form-label">Tipo de recebedor</label>
                    <select name="recebedor_subtype" class="form-select">
                      <option value="ong">ONG</option>
                      <option value="artista">Artista</option>
                      <option value="reclicador">Reclicador</option>
                    </select>
                    <!-- conditional fields for recebedor subtypes -->
                    <div id="recebedorOngFields" style="display:none; margin-top:0.75rem">
                      <label for="recebedor_cnpj" class="form-label">CNPJ</label>
                      <input id="recebedor_cnpj" name="recebedor_cnpj" type="text" class="form-control" placeholder="00.000.000/0000-00" />
                      <label for="recebedor_razao" class="form-label" style="margin-top:0.5rem">Razão social</label>
                      <input id="recebedor_razao" name="recebedor_razao" type="text" class="form-control" placeholder="Razão social (ONG/Empresa)" />
                    </div>
                    <div id="recebedorCpfFields" style="display:none; margin-top:0.75rem">
                      <label for="recebedor_cpf" class="form-label">CPF</label>
                      <input id="recebedor_cpf" name="recebedor_cpf" type="text" class="form-control" placeholder="000.000.000-00" />
                    </div>
                  </div>

                  <div class="d-flex justify-content-end">
                    <button class="btn btn-primary" type="submit">Criar conta</button>
                  </div>
                </form>

                <p class="mt-3">Já tem conta? <a href="login.html">Entrar</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="text-center mt-4 text-muted">© 2025 ReCo — Demo estático</footer>
    <script>
      (function(){
        const roleRadios = document.querySelectorAll('input[name=role]');
        const doadorFields = document.getElementById('doadorFields');
        const recebedorFields = document.getElementById('recebedorFields');
        const doadorTypeRadios = document.querySelectorAll('input[name=doador_type]');
        const razaoWrap = document.getElementById('razaoWrap');
        const doadorCpfFields = document.getElementById('doadorCpfFields');

        function updateVisibility(){
          const role = document.querySelector('input[name=role]:checked').value;
          if(role === 'doador'){
            doadorFields.style.display = '';
            recebedorFields.style.display = 'none';
          } else {
            doadorFields.style.display = 'none';
            recebedorFields.style.display = '';
          }
        }

        function updateRazao(){
          const t = document.querySelector('input[name=doador_type]:checked').value;
          if(t === 'ong'){
            razaoWrap.style.display = '';
            doadorCpfFields.style.display = 'none';
            document.getElementById('razao').required = true;
            document.getElementById('doador_cpf').required = false;
          } else if(t === 'pf'){
            razaoWrap.style.display = 'none';
            doadorCpfFields.style.display = '';
            document.getElementById('razao').required = false;
            document.getElementById('doador_cpf').required = true;
          } else {
            razaoWrap.style.display = 'none';
            doadorCpfFields.style.display = 'none';
            document.getElementById('razao').required = false;
            document.getElementById('doador_cpf').required = false;
          }
        }

        roleRadios.forEach(r=>r.addEventListener('change', updateVisibility));
        doadorTypeRadios.forEach(r=>r.addEventListener('change', updateRazao));
        updateVisibility(); updateRazao();

        // intercept submit to create a demo session and forward to profile with params
        const form = document.getElementById('registerForm');
        form.addEventListener('submit', function(e){
          e.preventDefault();
          try{
            const fd = new FormData(form);
            const params = new URLSearchParams();
            for(const [k,v] of fd.entries()) params.append(k, v);
            const email = fd.get('email');
            const role = fd.get('role') || 'recebedor';
            // write demo session keys
            localStorage.setItem('reco_token','dev-token');
            localStorage.setItem('reco_userId', String(email || 'user-dev'));
            localStorage.setItem('reco_role', String(role));
            // debug info so user sees what's happening in the page
            console.log('Register submit:', { email, role, params: params.toString() });
            // show short confirmation then redirect
            const msg = document.createElement('div');
            msg.className = 'alert alert-success mt-3';
            msg.textContent = 'Conta criada com sucesso — redirecionando...';
            form.parentNode.insertBefore(msg, form.nextSibling);
            setTimeout(()=> window.location.href = 'profile.html?' + params.toString(), 700);
          }catch(err){
            console.error('Erro no registro', err);
            alert('Erro ao criar conta: ' + (err && err.message ? err.message : String(err)));
          }
        });
      })();
    </script>

    <script>
      // Recebedor subtype conditional fields
      (function(){
        const recebedorSelect = document.querySelector('select[name=recebedor_subtype]');
        const recebedorOngFields = document.getElementById('recebedorOngFields');
        const recebedorCpfFields = document.getElementById('recebedorCpfFields');

        function updateRecebedorSubtype(){
          if(!recebedorSelect) return;
          const v = recebedorSelect.value;
          // show ONG fields for 'ong'
          if(v === 'ong'){
            recebedorOngFields.style.display = '';
            recebedorCpfFields.style.display = 'none';
            // set required attributes
            document.getElementById('recebedor_cnpj').required = true;
            document.getElementById('recebedor_razao').required = true;
            document.getElementById('recebedor_cpf').required = false;
          } else if(v === 'artista' || v === 'reclicador'){
            // artista and reclicador use CPF
            recebedorOngFields.style.display = 'none';
            recebedorCpfFields.style.display = '';
            document.getElementById('recebedor_cnpj').required = false;
            document.getElementById('recebedor_razao').required = false;
            document.getElementById('recebedor_cpf').required = true;
          } else {
            recebedorOngFields.style.display = 'none';
            recebedorCpfFields.style.display = 'none';
            document.getElementById('recebedor_cnpj').required = false;
            document.getElementById('recebedor_razao').required = false;
            document.getElementById('recebedor_cpf').required = false;
          }
        }

        if(recebedorSelect){
          recebedorSelect.addEventListener('change', updateRecebedorSubtype);
          // initial state
          updateRecebedorSubtype();
        }
      })();
    </script>

    <script src="js/header.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
  </html>
